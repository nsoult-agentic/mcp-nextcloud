# docker-compose.yml for mcp-nextcloud
# Generated by DockerCompose skill — reviewed by Engineer + RedTeam
# Deploy: Portainer → Stacks → Add from Repository → GitOps polling
# CI/CD: GitHub Actions builds image on push, updates this tag automatically
#
# SECURITY: This file was generated following PAI hardened container policy.
# Do NOT add: docker.sock mounts, privileged mode, host network/PID,
# extra capabilities, or secrets in environment variables.

services:
  mcp-nextcloud:
    image: ghcr.io/nsoult-agentic/mcp-nextcloud:sha-70b0013
    container_name: mcp-nextcloud
    restart: unless-stopped

    # ── Network ──
    networks:
      - mcp_network
    ports:
      - "127.0.0.1:8902:8902"  # Loopback — Claude Code MCP access
      - "172.16.10.25:8902:8902"  # LAN — FRAME-DESK file push via /receive

    # ── Security Hardening ──
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # ── Resource Limits ──
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

    # ── Filesystem ──
    volumes:
      # Secrets — root-owned on host, read-only in container
      - /srv/mcp-nextcloud/secrets:/secrets:ro
      # Upload staging — writable for /receive endpoint + readable for local_path uploads
      - /srv/mcp-nextcloud/upload:/data/upload:rw
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

    # ── Health Check ──
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8902/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # ── Environment ──
    environment:
      - NODE_ENV=production
      - SECRETS_DIR=/secrets
      - PORT=8902
      - UPLOAD_ALLOWED_DIRS=/data/upload
      # NEVER put credentials here — read from /secrets/credentials.json

networks:
  mcp_network:
    external: true
